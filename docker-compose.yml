services:
  gateway:
    build: .
    command: uvicorn services.gateway.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      GOVERNANCE_BASE: http://governance:8001
      OPTIMIZER_BASE:  http://optimizer:8002
      OPA_BASE:        http://opa:8181
      LLM_BASE:        http://llm:8004
      KPI_BASE:        http://kpi:8005
      POLICY_BASE:     http://policy:8006
      TWIN_BASE:       http://twin:8007
      PILOT_BASE:      http://twin:8007
      EVIDENCE_BASE:   http://evidence:8008
      OT_BASE:         http://ot:8009
      SECURITY_MODE:   dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - opa
      - governance
      - optimizer
      - llm
      - kpi
      - policy
      - twin
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=gco_admin
      - POSTGRES_PASSWORD=gco_secret
      - POSTGRES_DB=gco_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gco_admin -d gco_engine"]
      interval: 10s
      timeout: 5s
      retries: 5

  opa:
    image: openpolicyagent/opa:latest
    command: ["run", "--server", "--addr=0.0.0.0:8181", "/policies"]
    volumes:
      - ./services/opa/policies:/policies:ro
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  optimizer:
    build: .
    ports:
      - "8002:8002"
    volumes:
      - ./data:/app/data
    command: uvicorn services.optimizer.main:app --host 0.0.0.0 --port 8002 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/"]
      interval: 30s
      timeout: 10s
      retries: 3

  governance:
    build: .
    ports:
      - "8001:8001"
    environment:
      - GOVERNANCE_DB_URL=postgresql://gco_admin:gco_secret@db:5432/gco_engine
      - STORAGE_BACKEND=database
    volumes:
      - ./data:/app/data
    command: uvicorn services.governance.main:app --host 0.0.0.0 --port 8001 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      db:
        condition: service_healthy

  kpi:
    build: .
    command: uvicorn services.kpi.main:app --host 0.0.0.0 --port 8005 --reload
    environment:
      - GOVERNANCE_BASE=http://governance:8001
      - POLICY_NOTIFY_BASE=
      - YIELD_MIN=80.0
      - ALLOW_ORIGINS=*
      - KPI_DB_URL=postgresql://gco_admin:gco_secret@db:5432/gco_engine
      - STORAGE_BACKEND=database
    volumes:
      - ./data:/app/data
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8005/"]
      interval: 10s
      timeout: 2s
      retries: 5
    depends_on:
      db:
        condition: service_healthy

  policy:
    build: .
    command: uvicorn services.policy.main:app --host 0.0.0.0 --port 8006 --reload
    environment:
      - GOVERNANCE_BASE=http://governance:8001
      - KPI_BASE=http://kpi:8005
      - TWIN_BASE=http://twin:8007
      - ALLOW_ORIGINS=*
      - POLICY_DB_URL=postgresql://gco_admin:gco_secret@db:5432/gco_engine
      - STORAGE_BACKEND=database
    volumes:
      - ./data:/app/data
    ports:
      - "8006:8006"
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8006/"]
      interval: 10s
      timeout: 2s
      retries: 5
    depends_on:
      db:
        condition: service_healthy

  twin:
    build: .
    command: uvicorn services.twin.main:app --host 0.0.0.0 --port 8007 --reload
    environment:
      GOVERNANCE_BASE: "http://governance:8001"
      OPTIMIZER_BASE: "http://optimizer:8002"
      ALLOW_ORIGINS: "*"
    volumes:
      - ./twin/scenarios:/app/twin/scenarios
      - ./data:/app/data
    ports:
      - "8007:8007"
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8007/"]
      interval: 10s
      timeout: 2s
      retries: 5

  evidence:
    build:
      context: .
      dockerfile: services/evidence/Dockerfile
    command: uvicorn services.evidence.main:app --host 0.0.0.0 --port 8008 --reload
    environment:
      GOVERNANCE_BASE: "http://governance:8001"
      KPI_BASE: "http://kpi:8005"
      OPTIMIZER_BASE: "http://optimizer:8002"
      POLICY_BASE: "http://policy:8006"
      TWIN_BASE: "http://twin:8007"
      LLM_BASE: "http://llm:8004"
      ALLOW_ORIGINS: "*"
    volumes:
      - .:/app
    ports:
      - "8008:8008"
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8008/"]
      interval: 10s
      timeout: 2s
      retries: 5

  ot:
    build:
      context: services/ot
      dockerfile: Dockerfile
    command: uvicorn services.ot.main:app --host 0.0.0.0 --port 8009 --reload
    environment:
      - GOVERNANCE_BASE=http://governance:8001
      - FEATURE_SIMULATED_OPCUA=true
      - FEATURE_GUARDED=false
      - MIN_WRITE_INTERVAL_SEC=10
      - READBACK_TOLERANCE_TEMPERATURE=0.2
      - READBACK_TOLERANCE_FLOW=0.1
      - ALLOW_ORIGINS=*
      - OT_DB_URL=postgresql://gco_admin:gco_secret@db:5432/gco_engine
      - STORAGE_BACKEND=database
    volumes:
      - ./data:/app/data
    ports:
      - "8009:8009"
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8009/"]
      interval: 10s
      timeout: 2s
      retries: 5
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: .
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://gateway:8000
    command: streamlit run app/frontend/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      gateway:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
